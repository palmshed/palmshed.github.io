<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <meta name="description" content="Sign in to Palmshed.">
  <link rel="icon" href="assets/mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/mark.svg">
  <script src="https://js.hcaptcha.com/1/api.js?onload=onHcaptchaLoad&render=explicit" async defer></script>
  <script>
    // Backend API lives in a separate Vercel project. The site is on GitHub Pages,
    // so the API is a different origin. Replace with your Vercel deployment URL.
    var API_BASE = 'https://palmshed-auth.vercel.app';
    // Load public config, then render the captcha widget with the real site key.
    window.__captchaSiteKey = "";
    window.__captchaProvider = "hcaptcha";

    function renderCaptcha() {
      if (window.hcaptcha && window.__captchaSiteKey && !document.querySelector('.h-captcha iframe')) {
        window.hcaptcha.render(document.querySelector('.h-captcha'), {
          sitekey: window.__captchaSiteKey, theme: 'dark'
        });
      }
    }
    window.onHcaptchaLoad = renderCaptcha;

    fetch(API_BASE + '/api/config').then(function (r) { return r.json(); }).then(function (cfg) {
      window.__captchaSiteKey = cfg.captchaSiteKey || "";
      window.__captchaProvider = cfg.captchaProvider || "hcaptcha";
      renderCaptcha();
    }).catch(function () {});
  </script>
  <style>
    :root {
      --bg: #080909; --surface: #0e1010; --text: #e1e2e2; --text-secondary: #8f9191;
      --accent: #91AAA6; --border: rgba(255,255,255,0.04); --code-bg: rgba(255,255,255,0.015);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 2rem 1.5rem 0; max-width: 960px; margin: 0 auto; position: relative; }
    .nav-mark { font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.02em; }
    .nav-links { gap: 0.25rem; list-style: none; }
    .nav-links a {
      font-size: 0.875rem; color: var(--text-secondary); text-decoration: none;
      padding: 0.375rem 0.75rem; border-radius: 4px; transition: none;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--code-bg); }
    .mobile-menu-toggle {
      display: none; background: none; border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; padding: 0.5rem 0.75rem; color: var(--text-secondary);
      font-family: var(--font); font-size: 0.8125rem;
    }
    @media (max-width: 768px) {
      nav { padding: 1.25rem 1rem 0; }
      .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0;
        background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
        padding: 0.25rem; flex-direction: column; gap: 0; z-index: 100; margin: 0.5rem 1rem 0; }
      .nav-links.active { display: flex; }
      .nav-links a { padding: 0.75rem 1rem; font-size: 1rem; border-radius: 0; }
      .nav-links li:first-child a { border-radius: 6px 6px 0 0; }
      .nav-links li:last-child a { border-radius: 0 0 6px 6px; }
      .mobile-menu-toggle { display: flex; align-items: center; padding: 0.75rem 1rem; min-height: 44px; min-width: 44px; }
    }
    main { max-width: 960px; margin: 0 auto; padding: 4rem 1.5rem 5rem; }
    form { max-width: 360px; }
    h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; }
    .sub { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 2rem; }
    label { display: block; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.375rem; }
    input[type=text], input[type=password] {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.625rem 0.75rem; color: var(--text); font-size: 0.9375rem; font-family: var(--font);
    }
    input:focus { outline: 1.5px solid var(--accent); outline-offset: 1px; }
    .field { margin-bottom: 1.25rem; }
    .captcha-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; }
    .captcha-row .hcaptcha { transform: scale(0.9); transform-origin: left; }
    button.reset-captcha { background: none; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.75rem; cursor: pointer; }
    button.reset-captcha:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    button.submit { width: 100%; background: var(--accent); color: #080909; border: none; border-radius: 6px; padding: 0.7rem; font-size: 0.9375rem; font-weight: 500; cursor: pointer; }
    button.submit:disabled { opacity: 0.6; cursor: default; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 0.8125rem; }
    .msg { font-size: 0.875rem; margin-bottom: 1rem; min-height: 1.2rem; }
    .msg.error { color: #d98a8a; }
    .msg.ok { color: var(--accent); }
    footer { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 3rem; border-top: 1px solid rgba(255,255,255,0.1); }
    footer p { color: rgba(255,255,255,0.5); font-size: 0.8125rem; }
    footer .cap-badge { margin-top: 0.5rem; font-size: 0.75rem; }
    footer .cap-badge a { color: var(--text-secondary); }
  </style>
</head>
<body>
  <nav>
    <span class="nav-mark">palmshed</span>
    <ul class="nav-links" id="nav">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./projects.html">Projects</a></li>
      <li><a href="./docs.html">Docs</a></li>
      <li><a href="./login.html" class="active">Sign in</a></li>
    </ul>
    <button type="button" class="mobile-menu-toggle" aria-label="Menu" aria-expanded="false">Menu</button>
  </nav>
  <main>
    <h1 id="title">Sign in</h1>
    <p class="sub" id="sub">Access Palmshed services.</p>
    <div class="msg" id="msg"></div>

    <form id="form" method="post">
      <div class="field" id="emailField" hidden>
        <label for="email">Email (for password reset)</label>
        <input type="text" id="email" name="email" autocomplete="email">
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="captcha-row">
        <div class="h-captcha"></div>
        <button type="button" class="reset-captcha" id="resetCaptcha">Reset</button>
      </div>
      <button type="submit" class="submit" id="submit">Sign in</button>
      <div class="row">
        <a href="#" id="forgot">Forgot password?</a>
        <a href="#" id="toggle">Create account</a>
      </div>
    </form>
  </main>
  <footer><p>&copy; 2026 Palmshed</p><p class="cap-badge"><a href="./privacy.html">Privacy</a> · <a href="./terms.html">Terms</a> · This site is protected by hCaptcha. Its <a href="https://privacypolicy.hcaptcha.com" rel="noopener">Privacy Policy</a> and <a href="https://hcaptcha.com/terms" rel="noopener">Terms of Service</a> apply.</p></footer>

  <script>
    var form = document.getElementById('form');
    var msg = document.getElementById('msg');
    var submit = document.getElementById('submit');
    var forgot = document.getElementById('forgot');
    var toggle = document.getElementById('toggle');
    var title = document.getElementById('title');
    var sub = document.getElementById('sub');
    var emailField = document.getElementById('emailField');
    var resetBtn = document.getElementById('resetCaptcha');
    // Same base as defined in the head script above.
    var API = API_BASE;
    var mode = 'login';

    function show(text, kind) { msg.textContent = text; msg.className = 'msg ' + (kind || ''); }

    function captchaToken() {
      return (window.hcaptcha && window.hcaptcha.getResponse()) || '';
    }

    resetBtn.onclick = function () {
      if (window.hcaptcha) window.hcaptcha.reset();
    };

    function switchMode(to) {
      mode = to;
      if (mode === 'register') {
        title.textContent = 'Create account';
        sub.textContent = 'Register a new Palmshed account.';
        submit.textContent = 'Create account';
        forgot.style.display = 'none';
        emailField.hidden = false;
        toggle.textContent = 'Sign in';
      } else {
        title.textContent = 'Sign in';
        sub.textContent = 'Access Palmshed services.';
        submit.textContent = 'Sign in';
        forgot.style.display = '';
        emailField.hidden = true;
        toggle.textContent = 'Create account';
      }
      show('', '');
    }

    toggle.onclick = function (e) {
      e.preventDefault();
      switchMode(mode === 'login' ? 'register' : 'login');
    };

    forgot.onclick = function (e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      if (!username) { show('Enter your username first.', 'error'); return; }
      forgot.textContent = 'Sending...';
      fetch(API + '/forgot-password', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        mode: 'cors', credentials: 'include',
        body: JSON.stringify({ username: username, captcha: captchaToken() })
      }).then(function () {
        show('If the account exists, a reset link was sent.', 'ok');
        forgot.textContent = 'Forgot password?';
      }).catch(function () { show('Something went wrong.', 'error'); forgot.textContent = 'Forgot password?'; });
    };

    form.onsubmit = function (e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var captcha = captchaToken();
      if (!username || !password) { show('Fill in all fields.', 'error'); return; }
      if (!captcha) { show('Complete the captcha.', 'error'); return; }
      if (mode === 'register') {
        var email = document.getElementById('email').value.trim();
        submit.disabled = true; submit.textContent = 'Creating...';
        fetch(API + '/register', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          mode: 'cors', credentials: 'include',
          body: JSON.stringify({ username: username, password: password, email: email, captcha: captcha })
        }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
          .then(function (res) {
            if (res.ok) { show('Account created. You can now sign in.', 'ok'); switchMode('login'); }
            else { show(res.d.error || 'Registration failed.', 'error'); if (window.hcaptcha) window.hcaptcha.reset(); }
          })
          .catch(function () { show('Network error.', 'error'); })
          .finally(function () { submit.disabled = false; submit.textContent = 'Create account'; });
        return;
      }
      submit.disabled = true; submit.textContent = 'Signing in...';
      fetch(API + '/login', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        mode: 'cors', credentials: 'include',
        body: JSON.stringify({ username: username, password: password, captcha: captcha })
      }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
        .then(function (res) {
          if (res.ok && res.d.ok) { show('Signed in.', 'ok'); }
          else { show(res.d.error || 'Sign in failed.', 'error'); if (window.hcaptcha) window.hcaptcha.reset(); }
        })
        .catch(function () { show('Network error.', 'error'); })
        .finally(function () { submit.disabled = false; submit.textContent = 'Sign in'; });
    };

    var toggleBtn = document.querySelector('.mobile-menu-toggle');
    var navList = document.getElementById('nav');
    if (toggleBtn && navList) {
      toggleBtn.addEventListener('click', function () {
        var open = navList.classList.toggle('active');
        toggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  </script>
</body>
</html>
