<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>palmshed</title>
  <link rel="icon" href="assets/mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/mark.svg">
  <style>
    :root {
      color-scheme: light;
      --paper: #fff8c5;
      --line: #f0d98c;
      --ink: #1f2328;
      --green: #1f883d;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.55;
    }

    main {
      width: min(58rem, calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(2rem, 6vw, 5rem) 0;
    }

    header {
      display: grid;
      gap: 1rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      width: 2.5rem;
      height: 2.5rem;
      display: block;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      max-width: 11ch;
      font-size: clamp(2.75rem, 9vw, 6rem);
      line-height: 0.94;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 0.75rem;
      font-size: 1rem;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      max-width: 38rem;
    }

    a {
      color: var(--ink);
      text-decoration-color: var(--line);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }

    a:hover,
    a:focus-visible {
      color: var(--green);
      text-decoration-color: var(--green);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      padding-top: 0.5rem;
    }

    .links a {
      display: inline-flex;
      min-height: 2.65rem;
      align-items: center;
      padding: 0 1rem;
      border: 1px solid var(--green);
      border-radius: 0.5rem;
      background: var(--green);
      color: var(--paper);
      font-weight: 700;
      text-decoration: none;
    }

    section {
      padding: 2rem 0;
      border-bottom: 1px solid var(--line);
    }

    .repo-list {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .repo-list li {
      display: grid;
      gap: 0.15rem;
      padding: 0.8rem 0;
      border-top: 1px solid var(--line);
    }

    .repo-list li:first-child {
      border-top: 0;
    }

    .repo-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 2rem;
    }

    .repo-list li:nth-child(2) {
      border-top: 0;
    }

    .repo-name {
      font-weight: 700;
    }

    .repo-note {
      font-size: 0.94rem;
    }

    .archived {
      font-size: 0.86rem;
      font-weight: 700;
    }

    footer {
      padding-top: 1.5rem;
      font-size: 0.94rem;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 1.25rem, 58rem);
        padding: 1.25rem 0 2rem;
      }

      header {
        padding-bottom: 1.5rem;
      }

      h1 {
        font-size: clamp(2.5rem, 16vw, 4rem);
      }

      .links {
        display: grid;
      }

      .links a {
        justify-content: center;
      }

      .repo-list {
        grid-template-columns: 1fr;
      }

      .repo-list li:nth-child(2) {
        border-top: 1px solid var(--line);
      }

      section {
        padding: 1.5rem 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img class="mark" src="assets/mark.svg" alt="">
      <h1>palmshed</h1>
      <p>public org page. repo index. current links.</p>
      <nav class="links" aria-label="links">
        <a href="https://github.com/palmshed">github</a>
        <a href="https://github.com/orgs/palmshed/repositories?type=all">repos</a>
        <a href="https://github.com/pulls?q=is%3Aopen+org%3Apalmshed">pull requests</a>
      </nav>
    </header>

    <section aria-labelledby="repos">
      <h2 id="repos">repos</h2>
<!-- repo-list-start -->
      <ul class="repo-list">
        <li data-status="active" class="repo-item><a class="repo-name" href="https://github.com/palmshed/.github">.github</a><span class="repo-note">Org profile.</span>
          <div class="repo-meta">
            <span class="repo-contribs"> by <a href="https://github.com/bniladridas">bniladridas</a>, <a href="https://github.com/gpucomm-hq">gpucomm-hq</a></span>
            <span class="repo-updated">Last pushed: 2026-06-26</span>
            <span class="repo-status">Actively maintained</span>
          </div></li>
[...content truncated...]
    </ul>
    <!-- repo-list-end -->
    </section>

    <footer>
      updated 2026-06-30.
    </footer>
  </main>
</body>
</html>
